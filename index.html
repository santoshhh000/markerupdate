                class: 'rounded-md border border-theme-border px-2 py-1 hover:bg-theme-bg-soft disabled:opacity-40 focus:outline-none',
                disabled: state.currentPage <= 1, onclick: () => { state.currentPage--; App.Render(); }
              }, 'Previous'),
              h('span', { class: 'px-2' }, `${state.currentPage} / ${totalPages}`),
              h('button', {
                class: 'rounded-md border border-theme-border px-2 py-1 hover:bg-theme-bg-soft disabled:opacity-40 focus:outline-none',
                disabled: state.currentPage >= totalPages, onclick: () => { state.currentPage++; App.Render(); }
              }, 'Next')
            )
          )
        );
      },

      /**
       * SUMMARY TAB: marker frequency table with CSS bar charts, optional
       * cross-variable breakdown, and a ready-to-paste Decipher XML block.
       */
      renderSummaryPanel(counts) {
        // Empty state — user hasn't processed the dataset yet
        if (!state.processedRows) {
          return h('div', { class: 'rounded-xl border border-theme-border bg-theme-card p-8 text-center text-xs text-theme-muted' }, 'Click "Process Markers" above to generate output distribution statistics.');
        }

        const totalRows = state.processedRows.length;
        const sortedCounts = [...counts.entries()].sort((a, b) => b[1] - a[1]); // most frequent first

        return h('div', { class: 'space-y-4' },
          h('div', { class: 'rounded-xl border border-theme-border bg-theme-card p-3.5 shadow-2xs' },
            h('div', { class: 'mb-3 flex items-center justify-between' },
              h('h3', { class: 'text-xs font-bold uppercase tracking-wider text-theme-text' }, 'Marker Quota Distribution'),
              h('button', {
                class: 'rounded-lg bg-theme-bg-soft border border-theme-border px-3 py-1.5 text-xs font-semibold text-theme-text hover:bg-theme-border transition-all focus:outline-none',
                onclick: () => Exporter.exportSummaryReport()
              }, '⬇ Export Summary (.xlsx)')
            ),
            h('div', { class: 'max-h-[45vh] overflow-auto rounded-lg border border-theme-border' },
              h('table', { class: 'w-full text-[11px]' },
                h('thead', { class: 'sticky top-0 bg-theme-table-header' },
                  h('tr', {}, ['Marker Path', 'Count', 'Share', 'Distribution Bar'].map(t => h('th', { class: `whitespace-nowrap px-3 py-2 text-left font-bold text-theme-text ${t === 'Count' || t === 'Share' ? 'text-right' : ''}` }, t)))
                ),
                h('tbody', { class: 'divide-y divide-theme-border/40' },
                  sortedCounts.map(([marker, count]) => {
                    const pct = ((count / (totalRows || 1)) * 100).toFixed(1); // || 1 avoids /0
                    // HEURISTIC: >3 path segments → treat as a crossed marker (purple)
                    const isCrossed = state.crossEnabled && marker.split('/').length > 3;
                    return h('tr', { class: 'hover:bg-theme-hover' },
                      h('td', { class: `px-3 py-1.5 mono font-medium break-all ${isCrossed ? 'text-theme-cross' : 'text-theme-text'}` }, marker),
                      h('td', { class: 'px-3 py-1.5 text-right mono font-bold text-theme-text' }, String(count)),
                      h('td', { class: 'px-3 py-1.5 text-right mono text-theme-muted' }, `${pct}%`),
                      // Pure-CSS bar chart: inner div width = percentage share
                      h('td', { class: 'px-3 py-1.5 w-2/5' },
                        h('div', { class: 'h-2 w-full overflow-hidden rounded-full bg-theme-bg-soft' },
                          h('div', { class: `h-full rounded-full ${isCrossed ? 'bg-theme-cross' : 'bg-theme-primary'}`, style: `width:${pct}%` })
                        )
                      )
                    );
                  })
                )
              )
            )
          ),

          // Cross-variable breakdown chips (only when crossing is active)
          (() => {
            const crossDist = App.Helpers.getCrossDistribution();
            if (!state.crossEnabled || crossDist.length === 0) return null;
            return h('div', { class: 'rounded-xl border border-theme-border bg-theme-card p-3.5 shadow-2xs' },
              h('h3', { class: 'mb-2.5 text-xs font-bold uppercase tracking-wider text-theme-text' }, `Cross Variable Breakdown (${state.crossCol})`),
              h('div', { class: 'flex flex-wrap gap-1.5' },
                crossDist.map(d => {
                  const share = ((d.count / totalRows) * 100).toFixed(1);
                  return h('span', { class: 'rounded-lg bg-theme-bg-soft border border-theme-border px-2.5 py-1 mono text-xs text-theme-text' },
                    h('b', {}, d.value), `: ${d.count} (${share}%)`
                  );
                })
              )
            );
          })(),

          // Decipher XML generator: one <marker> element per unique marker.
          // Element names must not contain "/", so path slashes are collapsed
          // into underscores: /B6Quota/B6r1 → B6Quota_B6r1
          (() => {
            let xml = '<quota label="q_markers" overquota="no" sheet="q_markers">\n';
            sortedCounts.forEach(([m]) => {
              const cleanName = m.replace(/^\/+|\/+$/g, '').replace(/\//g, '_'); // strip edge slashes, replace inner ones
              xml += `  <marker name="${cleanName}" condition="1">${m}</marker>\n`;
            });
            xml += '</quota>';

            return h('div', { class: 'rounded-xl border border-theme-border bg-theme-bg-soft p-3.5 shadow-2xs' },
              h('div', { class: 'mb-2 flex items-center justify-between' },
                h('h3', { class: 'text-xs font-bold uppercase tracking-wider text-theme-text' }, 'Survey Script Generator (Decipher XML)'),
                h('button', {
                  class: 'rounded-lg bg-theme-primary px-3 py-1 text-xs font-semibold text-white hover:bg-theme-primary-hover transition-all focus:outline-none',
                  onclick: () => { navigator.clipboard.writeText(xml); Toast.show('Copied Decipher XML block to clipboard', 'success'); }
                }, '📋 Copy XML Block')
              ),
              // <pre> renders XML as-is; content added as a text node via h(), so it's auto-escaped
              h('pre', { class: 'max-h-36 overflow-auto rounded-lg border border-theme-border bg-theme-card p-2.5 text-[10px] mono text-theme-text' }, xml)
            );
          })()
        );
      },

      // Diagnostics tab: green "all clear" banner or a color-coded issue list
      renderDiagnosticsPanel(issuesList) {
        return h('div', { class: 'rounded-xl border border-theme-border bg-theme-card p-3.5 shadow-2xs' },
          issuesList.length === 0
            ? h('div', { class: 'rounded-xl bg-theme-success-bg border border-theme-success/30 px-4 py-3 text-xs font-bold text-theme-success' }, '✓ Zero formatting or mapping diagnostics detected. Clean dataset.')
            : h('ul', { class: 'space-y-2 text-xs font-medium' },
                issuesList.map(item => h('li', {
                  class: `rounded-xl px-3 py-2.5 border flex items-start gap-2 ${item.type === 'warn' ? 'bg-theme-warning-bg text-theme-warning border-theme-warning/30' : 'bg-theme-bg-soft text-theme-text border-theme-border'}`
                }, h('span', { class: 'font-bold uppercase text-[10px] shrink-0 mt-0.5' }, `[${item.type}]`), item.message))
              )
        );
      }
    };

    /* -------------------------------------------------------------------------
       PUBLIC API — only these members are reachable from outside the IIFE.
       ------------------------------------------------------------------------- */
    return {
      Helpers: {
        getCurrentSheet() { return state.sheets.find(s => s.name === state.activeSheet); },

        // Tallies how many respondents carry each unique marker.
        // Recomputed per render — acceptable for typical dataset sizes.
        getMarkerCounts() {
          if (!state.processedRows) return new Map();
          const counts = new Map();
          const outputCol = state.markersCol.trim() || 'markers';
          for (const row of state.processedRows) {
            const val = row[outputCol]; if (!val) continue;
            for (const marker of String(val).split(',').map(x => x.trim()).filter(Boolean)) counts.set(marker, (counts.get(marker) || 0) + 1);
          }
          return counts;
        },

        // Value frequency of the cross column ('' and '0' skipped as N.A.).
        // Sort: numeric values sort numerically (1, 2, 10 — not 1, 10, 2),
        // non-numeric fall back to locale-aware string comparison.
        getCrossDistribution() {
          const sheet = this.getCurrentSheet();
          if (!sheet || !state.crossEnabled || !sheet.headers.includes(state.crossCol)) return [];
          const counts = new Map();
          for (const r of sheet.rows) {
            const v = r[state.crossCol]; if (v === '' || v === null || v === undefined) continue;
            const s = String(v).trim(); if (s === '0') continue; counts.set(s, (counts.get(s) || 0) + 1);
          }
          return [...counts.entries()].map(([value, count]) => ({ value, count })).sort((a, b) => {
            const na = Number(a.value), nb = Number(b.value);
            if (!isNaN(na) && !isNaN(nb)) return na - nb;
            return String(a.value).localeCompare(String(b.value));
          });
        },

        // QA checks (run only after processing):
        //   1. warn  — enabled prefix rule matched 0 columns
        //   2. info  — respondents ending up with zero markers
        //   3. warn  — markers containing "/" but not STARTING with "/"
        //              (violates Decipher's absolute-path naming convention)
        getDiagnostics() {
          const sheet = this.getCurrentSheet(); const out = [];
          if (!state.processedRows || !sheet) return out;
          for (const rule of state.rules) {
            if (!rule.enabled) continue;
            if (rule.mode === 'prefix' && rule.colPrefix && !sheet.headers.some(h => h.startsWith(rule.colPrefix))) out.push({ type: 'warn', message: `Rule prefix "${rule.colPrefix}" matched 0 columns in the current dataset.` });
          }
          const outputCol = state.markersCol.trim() || 'markers';
          let zeroCount = 0;
          for (const row of state.processedRows) if (!String(row[outputCol] || '').trim()) zeroCount++;
          if (zeroCount) out.push({ type: 'info', message: `${zeroCount} respondent rows resulted in 0 output markers.` });
          let badSlash = 0;
          for (const m of this.getMarkerCounts().keys()) if (m.includes('/') && !m.startsWith('/')) badSlash++;
          if (badSlash) out.push({ type: 'warn', message: `${badSlash} output marker(s) contain "/" but do not begin with "/" (Decipher naming violation).` });
          return out;
        }
      },

      // Mobile drawer control. Open() also (re)renders the sidebar into the
      // drawer slot so its content is always fresh with current state.
      Navigation: {
        openSidebar() {
          state.sidebarOpen = true; document.body.classList.add('sidebar-open'); // lock body scroll
          document.getElementById('sidebarBackdrop').classList.remove('hidden-backdrop');
          document.getElementById('sidebarPanel').classList.remove('off-screen'); // triggers CSS slide-in
          const sheet = App.Helpers.getCurrentSheet();
          if (sheet) { const sc = document.getElementById('mobileSidebarContent'); sc.innerHTML = ''; sc.appendChild(Components.renderSidebar(sheet)); }
        },
        closeSidebar() {
          state.sidebarOpen = false; document.body.classList.remove('sidebar-open');
          document.getElementById('sidebarBackdrop').classList.add('hidden-backdrop');
          document.getElementById('sidebarPanel').classList.add('off-screen'); // CSS slide-out
        }
      },

      /**
       * MASTER RENDER — full teardown-and-rebuild of #app.
       * Simple and bug-resistant (UI can never drift out of sync with state),
       * at the cost of losing input focus/scroll position on re-render.
       * That's exactly why text inputs defer Render() to their onchange (blur).
       */
      Render() {
        StorageEngine.save(); Components.renderHeaderActions();
        const appEl = document.getElementById('app'); appEl.innerHTML = '';
        // Hamburger is only relevant once a file is loaded
        const sidebarToggle = document.getElementById('sidebarToggle');
        if (sidebarToggle) sidebarToggle.style.display = state.workbook ? '' : 'none';

        if (!state.workbook) { appEl.appendChild(Components.renderUploadScreen()); return; }
        const currentSheet = App.Helpers.getCurrentSheet(); if (!currentSheet) return;

        // Desktop layout: fixed-width sticky sidebar + fluid main area.
        // minmax(0,1fr) prevents wide tables from blowing the grid open.
        const grid = h('div', { class: 'grid gap-5 lg:grid-cols-[340px_minmax(0,1fr)] xl:grid-cols-[360px_minmax(0,1fr)] items-start' });
        const desktopSidebar = h('div', { class: 'hidden lg:block sticky top-16' }); // top-16 clears the sticky header
        desktopSidebar.appendChild(Components.renderSidebar(currentSheet));
        grid.appendChild(desktopSidebar);

        grid.appendChild(Components.renderMainWorkspace(currentSheet, ProcessingEngine.buildMergedMap(currentSheet), App.Helpers.getMarkerCounts()));
        appEl.appendChild(grid);

        // If the mobile drawer is open, refresh its copy of the sidebar too
        if (state.sidebarOpen) { const sc = document.getElementById('mobileSidebarContent'); sc.innerHTML = ''; sc.appendChild(Components.renderSidebar(currentSheet)); }
      },

      /**
       * BOOTSTRAP — load saved config, first render, wire global events.
       *
       * Drag & drop uses a DEPTH COUNTER because dragenter/dragleave fire for
       * every child element the cursor crosses. Only hiding the overlay when
       * depth returns to 0 prevents flicker as the cursor moves over children.
       *
       * dragover MUST call preventDefault(), otherwise the browser navigates
       * to the dropped file instead of firing our 'drop' handler.
       */
      Init() {
        StorageEngine.load(); this.Render();
        const overlay = document.getElementById('dropOverlay'); let dragDepth = 0;
        window.addEventListener('dragenter', (e) => { if (!e.dataTransfer?.types.includes('Files')) return; dragDepth++; overlay.classList.remove('hidden'); overlay.style.display = 'flex'; });
        window.addEventListener('dragleave', () => { dragDepth = Math.max(0, dragDepth - 1); if (dragDepth === 0) { overlay.classList.add('hidden'); overlay.style.display = 'none'; } });
        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => { e.preventDefault(); dragDepth = 0; overlay.classList.add('hidden'); overlay.style.display = 'none'; const file = e.dataTransfer.files?.[0]; if (file) ProcessingEngine.parseFile(file); });
        // Keyboard accessibility: Escape closes the mobile drawer
        window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && state.sidebarOpen) App.Navigation.closeSidebar(); });
      }
    };
  })();

  // Start the app once the DOM is ready (theme was already applied earlier
  // in <head> to prevent a flash of unthemed content)
  window.addEventListener('DOMContentLoaded', () => App.Init());
  </script>
</body>
</html>
